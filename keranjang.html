<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang - Esteler Yummy</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3fff6;
}

nav{
background:#17a673;
padding:12px;
display:flex;
justify-content:center;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.item{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

button{
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.hapus{
background:red;
color:white;
}

.pesan{
background:#17a673;
color:white;
padding:12px;
margin-top:15px;
width:100%;
font-weight:bold;
}

.pembayaran{
background:white;
padding:15px;
border-radius:10px;
margin-top:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.qris{
width:200px;
margin-top:10px;
border-radius:10px;
}

.rek{
background:#f5f5f5;

}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="keranjang.html">Keranjang</a>
<a href="lokasi.html">Lokasi</a>
</nav>

<div class="container">

<h2>Keranjang Pesanan</h2>

<div id="list"></div>

<!-- PEMBAYARAN -->

<div class="pembayaran">

<h3>Pembayaran</h3>

<p><b>Transfer Bank BCA</b></p>

<div class="rek">
A/N Oky Priastomo <br>
Bank BCA : <b>4920818060</b>
</div>

<p style="margin-top:15px;"><b>Bayar via QRIS</b></p>

<img src="qris.jpg" class="qris">

<p style="font-size:13px;color:gray;">
Scan QRIS lalu kirim bukti pembayaran ke WhatsApp
</p>

</div>

<button class="pesan" onclick="orderWA()">Pesan via WhatsApp</button>

</div>

<script>

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

let list=document.getElementById("list");

function tampil(){

if(keranjang.length==0){
list.innerHTML="Keranjang kosong";
return;
}

let html="";

keranjang.forEach((item,i)=>{

html+=`
<div class="item">
<span>${item.nama} x ${item.jumlah}</span>
<button class="hapus" onclick="hapus(${i})">Hapus</button>
</div>
`;

});

list.innerHTML=html;

}

function hapus(i){

keranjang.splice(i,1);

localStorage.setItem("keranjang",JSON.stringify(keranjang));

tampil();

}

function orderWA(){

if(keranjang.length==0){
alert("Keranjang kosong");
return;
}

let pesan="Pesanan Rokupang & Es Teler Yummy:%0A";

keranjang.forEach((item,i)=>{

pesan+=(i+1)+". "+item.nama+" x "+item.jumlah+"%0A";

});

pesan+="%0APembayaran: Transfer / QRIS";

window.open("https://wa.me/6282217743964?text="+pesan);

}

tampil();

</script>

</body>
</html>

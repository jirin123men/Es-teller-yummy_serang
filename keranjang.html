<script>

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

let list = document.getElementById("list");
let totalBox = document.getElementById("totalBayar");

function tampil(){

if(keranjang.length === 0){
list.innerHTML="<p>Keranjang kosong</p>";
totalBox.innerHTML="";
return;
}

let html="";
let total=0;

keranjang.forEach((item,i)=>{

/* ubah harga jadi angka */

let harga = parseInt(item.harga.toString().replace(/\D/g,'')) || 0;

let subtotal = harga * item.jumlah;

total += subtotal;

html+=`

<div class="item">

<div>
<b>${item.nama}</b><br>
Harga : Rp${harga.toLocaleString()}<br>
Subtotal : <b>Rp${subtotal.toLocaleString()}</b>
</div>

<div class="qty">

<button onclick="kurang(${i})">-</button>

<span style="margin:0 10px">${item.jumlah}</span>

<button onclick="tambah(${i})">+</button>

<button class="hapus" onclick="hapus(${i})">Hapus</button>

</div>

</div>

`;

});

list.innerHTML=html;

totalBox.innerHTML="Total yang harus ditransfer : Rp "+total.toLocaleString();

}

function tambah(i){
keranjang[i].jumlah++;
simpan();
}

function kurang(i){

if(keranjang[i].jumlah>1){
keranjang[i].jumlah--;
}else{
keranjang.splice(i,1);
}

simpan();

}

function hapus(i){
keranjang.splice(i,1);
simpan();
}

function simpan(){

localStorage.setItem("keranjang",JSON.stringify(keranjang));

tampil();

}

function orderWA(){

if(keranjang.length===0){
alert("Keranjang kosong");
return;
}

let metode=document.querySelector('input[name="bayar"]:checked');

if(!metode){
alert("Pilih metode pembayaran");
return;
}

let pesan="Pesanan Esteler Yummy:%0A%0A";

let total=0;

keranjang.forEach((item,i)=>{

let harga = parseInt(item.harga.toString().replace(/\D/g,'')) || 0;

let subtotal = harga * item.jumlah;

total += subtotal;

pesan+=(i+1)+". "+item.nama+" x "+item.jumlah+
" = Rp"+subtotal+"%0A";

});

pesan+="%0ATotal Transfer : Rp"+total;

pesan+="%0AMetode Bayar : "+metode.value;

window.open("https://wa.me/6282217743964?text="+pesan);

}

tampil();

</script>

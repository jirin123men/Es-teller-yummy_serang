<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Esteler Yummy</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3fff6;
}

nav{
background:#17a673;
padding:12px;
display:flex;
justify-content:center;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

button{
background:#17a673;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

#toast{
visibility:hidden;
background:#17a673;
color:white;
padding:12px;
border-radius:6px;
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
}

#toast.show{
visibility:visible;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="keranjang.html">Keranjang</a>
<a href="lokasi.html">Lokasi</a>
</nav>

<div class="container">

<h2>Menu Produk</h2>

<div class="menu">

<div class="card">
<h3>Es Teler Yummy</h3>
<button onclick="tambah('Es Teler Yummy')">+ Tambah</button>
</div>

<div class="card">
<h3>Es Coklat</h3>
<button onclick="tambah('Es Coklat')">+ Tambah</button>
</div>

<div class="card">
<h3>Rokupang</h3>
<button onclick="tambah('Rokupang')">+ Tambah</button>
</div>

</div>

</div>

<div id="toast">Produk ditambahkan ke keranjang</div>

<script>

function tambah(nama){

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

let index = keranjang.findIndex(p => p.nama === nama);

if(index !== -1){
keranjang[index].jumlah += 1;
}else{
keranjang.push({nama:nama,jumlah:1});
}

localStorage.setItem("keranjang",JSON.stringify(keranjang));

showToast();

}

function showToast(){

let toast=document.getElementById("toast");

toast.className="show";

setTimeout(function(){
toast.className=toast.className.replace("show","");
},2000);

}

</script>

</body>
</html>
</div>

<script>

function tambah(nama,jumlah){

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

let index = keranjang.findIndex(p => p.nama === nama);

if(index !== -1){

keranjang[index].jumlah += jumlah;

}else{

keranjang.push({nama:nama,jumlah:jumlah});

}

localStorage.setItem("keranjang",JSON.stringify(keranjang));

alert("Produk ditambahkan ke keranjang");

}

</script>

</body>
</html>

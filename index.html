
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esteler Yummy Serang</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f1fff5;
}

header{
background:#17a673;
color:white;
text-align:center;
padding:20px;
}

.container{
width:90%;
max-width:900px;
margin:auto;
padding:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.card{
background:white;
border-radius:8px;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:6px;
}

form{
background:white;
padding:20px;
margin-top:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#17a673;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.qris{
text-align:center;
margin-top:20px;
}

footer{
background:#17a673;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>Esteler Yummy Serang</h1>
<p>Minuman Segar Favorit</p>
</header>

<div class="container">

<h2>Menu Produk</h2>

<div class="menu">

<div class="card">
<img src="https://i.imgur.com/6V9QK9T.jpg">
<h3>Es Teler Original</h3>
<p>Rp12.000</p>
</div>

<div class="card">
<img src="https://i.imgur.com/6V9QK9T.jpg">
<h3>Es Teler Durian</h3>
<p>Rp15.000</p>
</div>

<div class="card">
<img src="https://i.imgur.com/6V9QK9T.jpg">
<h3>Es Teler Alpukat</h3>
<p>Rp13.000</p>
</div>

</div>

<h2>Form Pemesanan</h2>

<form onsubmit="kirimWA(); return false;">

<label>Nama Pembeli</label>
<input type="text" id="nama">

<label>Nomor WhatsApp</label>
<input type="text" id="wa">

<label>Alamat Pengiriman</label>
<textarea id="alamat"></textarea>

<label>Pilih Menu</label>
<select id="menu">
<option>Es Teler Original</option>
<option>Es Teler Durian</option>
<option>Es Teler Alpukat</option>
</select>

<label>Jumlah Produk</label>
<input type="number" id="jumlah">

<label>Catatan Pesanan / Promo</label>
<textarea id="catatan"></textarea>

<button type="submit">Kirim Pesanan</button>

</form>

<div class="qris">

<h2>Pembayaran</h2>

<p>No Rek: 8771003648</p>
<p>Atas Nama: ADITYA SURYA PRAWIRA MULYA</p>

<img src="qris.jpg" width="200">

</div>

</div>

<footer>
<p>© 2026 Esteler Yummy Serang</p>
</footer>

<script>

function kirimWA(){

var nama = document.getElementById("nama").value;
var wa = document.getElementById("wa").value;
var alamat = document.getElementById("alamat").value;
var menu = document.getElementById("menu").value;
var jumlah = document.getElementById("jumlah").value;
var catatan = document.getElementById("catatan").value;

var pesan = "Pesanan Esteler Yummy%0A"
+ "Nama: " + nama + "%0A"
+ "WA: " + wa + "%0A"
+ "Alamat: " + alamat + "%0A"
+ "Menu: " + menu + "%0A"
+ "Jumlah: " + jumlah + "%0A"
+ "Catatan: " + catatan;

window.open("https://wa.me/6282217743964?text=" + pesan);

}

</script>

</body>
</html>

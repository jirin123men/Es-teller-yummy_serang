<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esteler Yummy Serang</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3fff6;
}

/* NAVBAR */

nav{
background:#17a673;
padding:10px;
display:flex;
justify-content:center;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HEADER */

header{
text-align:center;
padding:30px;
background:#1cc88a;
color:white;
}

/* SECTION */

section{
padding:20px;
max-width:900px;
margin:auto;
}

/* MENU PRODUK */

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:6px;
}

button{
background:#17a673;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

/* KERANJANG */

#keranjangList{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

footer{
background:#17a673;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav>
<a href="#home">Home</a>
<a href="#menu">Menu</a>
<a href="#keranjang">Keranjang</a>
<a href="#lokasi">Lokasi</a>
</nav>

<!-- HOME -->

<header id="home">
<h1>Esteler Yummy Serang</h1>
<p>Segar • Manis • Enak</p>
</header>

<!-- MENU -->

<section id="menu">

<h2>Menu Produk</h2>

<div class="menu">

<div class="card">
<img src="https://i.imgur.com/6V9QK9T.jpg">
<h3>Es Teler Original</h3>
<p>Rp12.000</p>
<button onclick="tambah('Es Teler Original')">Tambah</button>
</div>

<div class="card">
<img src="https://i.imgur.com/6V9QK9T.jpg">
<h3>Es Teler Durian</h3>
<p>Rp15.000</p>
<button onclick="tambah('Es Teler Durian')">Tambah</button>
</div>

<div class="card">
<img src="https://i.imgur.com/6V9QK9T.jpg">
<h3>Es Teler Alpukat</h3>
<p>Rp13.000</p>
<button onclick="tambah('Es Teler Alpukat')">Tambah</button>
</div>

</div>

</section>

<!-- KERANJANG -->

<section id="keranjang">

<h2>Keranjang Pesanan</h2>

<div id="keranjangList">
Belum ada pesanan
</div>

<br>

<button onclick="orderWA()">Pesan via WhatsApp</button>

</section>

<!-- LOKASI -->

<section id="lokasi">

<h2>Lokasi Toko</h2>

<p>Alamat: Serang, Banten</p>

<iframe 
src="https://maps.google.com/maps?q=serang&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="300">
</iframe>

</section>

<footer>
© 2026 Esteler Yummy Serang
</footer>

<script>

let keranjang=[];

function tambah(menu){
keranjang.push(menu);
tampil();
}

function tampil(){

let list=document.getElementById("keranjangList");

if(keranjang.length==0){
list.innerHTML="Belum ada pesanan";
return;
}

let html="";

keranjang.forEach((item,i)=>{
html+= (i+1)+". "+item+"<br>";
});

list.innerHTML=html;

}

function orderWA(){

if(keranjang.length==0){
alert("Keranjang kosong");
return;
}

let pesan="Pesanan Esteler Yummy:%0A";

keranjang.forEach((item,i)=>{
pesan+= (i+1)+". "+item+"%0A";
});

window.open("https://wa.me/6282217743964?text="+pesan);

}

</script>

</body>
</html>

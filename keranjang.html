<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang - Esteler Yummy</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f3fff6;
}

/* NAVBAR */

nav{
background:#17a673;
padding:12px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* ITEM */

.item{
background:white;
padding:15px;
border-radius:8px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

/* TOTAL */

.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

/* BUTTON */

button{
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

.hapus{
background:red;
color:white;
}

.pesan{
background:#17a673;
color:white;
padding:14px;
margin-top:20px;
width:100%;
font-weight:bold;
font-size:16px;
}

/* PEMBAYARAN */

.pembayaran{
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.rek{
background:#f5f5f5;
padding:10px;
border-radius:6px;
margin-top:10px;
}

.qris{
width:220px;
margin-top:10px;
border-radius:10px;
}

.metode{
margin-top:10px;
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="keranjang.html">Keranjang</a>
<a href="lokasi.html">Lokasi</a>
</nav>

<div class="container">

<h2>Keranjang Pesanan</h2>

<div id="list"></div>

<div class="total" id="total"></div>

<div class="pembayaran">

<h3>Pilih Metode Pembayaran</h3>

<div class="metode">
<label>
<input type="radio" name="bayar" value="Transfer BCA">
Transfer Bank BCA
</label>
</div>

<div class="metode">
<label>
<input type="radio" name="bayar" value="QRIS">
QRIS
</label>
</div>

<p><b>Transfer Bank BCA</b></p>

<div class="rek">
A/N Oky Priastomo <br>
Bank BCA : <b>4920818060</b>
</div>

<p style="margin-top:15px;"><b>Bayar via QRIS</b></p>

<img src="qris.jpg" class="qris">

<p style="font-size:13px;color:gray">
Scan QRIS lalu kirim bukti pembayaran ke WhatsApp
</p>

</div>

<button class="pesan" onclick="orderWA()">Pesan via WhatsApp</button>

</div>

<script>

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

let list = document.getElementById("list");
let totalBox = document.getElementById("total");

function tampil(){

if(keranjang.length==0){
list.innerHTML="Keranjang kosong";
totalBox.innerHTML="";
return;
}

let html="";
let total=0;

keranjang.forEach((item,i)=>{

let subtotal=item.harga*item.jumlah;
total+=subtotal;

html+=`
<div class="item">
<div>
<b>${item.nama}</b><br>
${item.jumlah} x Rp${item.harga.toLocaleString()}
</div>

<button class="hapus" onclick="hapus(${i})">Hapus</button>
</div>
`;

});

list.innerHTML=html;

totalBox.innerHTML="Total: Rp "+total.toLocaleString();

}

function hapus(i){

keranjang.splice(i,1);

localStorage.setItem("keranjang",JSON.stringify(keranjang));

tampil();

}

function orderWA(){

if(keranjang.length==0){
alert("Keranjang kosong");
return;
}

let metode=document.querySelector('input[name="bayar"]:checked');

if(!metode){
alert("Pilih metode pembayaran dulu");
return;
}

let pesan="Pesanan Esteler Yummy:%0A%0A";

let total=0;

keranjang.forEach((item,i)=>{

let subtotal=item.harga*item.jumlah;

total+=subtotal;

pesan+=(i+1)+". "+item.nama+" x "+item.jumlah+" = Rp"+subtotal+"%0A";

});

pesan+="%0ATotal: Rp"+total;
pesan+="%0AMetode Bayar: "+metode.value;
pesan+="%0A%0AMohon konfirmasi pesanan.";

window.open("https://wa.me/6282217743964?text="+pesan);

}

tampil();

</script>

</body>
</html>

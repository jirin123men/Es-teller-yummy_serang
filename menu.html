<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Esteler Yummy</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3fff6;
}

/* NAVBAR */

nav{
background:#17a673;
padding:12px;
display:flex;
justify-content:center;
gap:20px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HERO BACKGROUND */

.hero{
background:url("bg.png") center/cover;
height:200px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:28px;
font-weight:bold;
text-shadow:0 2px 5px rgba(0,0,0,0.5);
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* MENU GRID */

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

/* CARD PRODUK */

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

/* BUTTON */

button{
background:#17a673;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

/* NOTIFIKASI */

#notif{
position:fixed;
bottom:25px;
right:25px;
background:#17a673;
color:white;
padding:14px 18px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
opacity:0;
transform:translateY(20px);
transition:0.3s;
font-size:14px;
}

#notif.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="menu.html">Menu</a>
<a href="keranjang.html">Keranjang</a>
<a href="lokasi.html">Lokasi</a>
</nav>

<div class="hero">
Menu Esteler Yummy
</div>

<div class="container">

<h2>Menu Produk</h2>

<div class="menu">

<div class="card">
<img src="1.png">
<h3>Es Teler Yummy</h3>
<button onclick="tambah('Es Teler Yummy')">+ Tambah</button>
</div>

<div class="card">
<img src="2.png">
<h3>Es Coklat</h3>
<button onclick="tambah('Es Coklat')">+ Tambah</button>
</div>

<div class="card">
<img src="3.png">
<h3>Rokupang</h3>
<button onclick="tambah('Rokupang')">+ Tambah</button>
</div>

</div>

</div>

<div id="notif">✔ Produk sudah masuk ke keranjang</div>

<script>

function tambah(nama){

let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

let index = keranjang.findIndex(p => p.nama === nama);

if(index !== -1){
keranjang[index].jumlah += 1;
}else{
keranjang.push({nama:nama,jumlah:1});
}

localStorage.setItem("keranjang",JSON.stringify(keranjang));

notif();

}

function notif(){

let n = document.getElementById("notif");

n.classList.add("show");

setTimeout(function(){
n.classList.remove("show");
},2000);

}

</script>

</body>
</html>
